site_name: Trabalho — Spark, Delta Lake e Iceberg
site_description: Documentação do trabalho de Arquitetura de Dados (SATC)

theme:
  name: material
  language: pt

nav:
  - Início (contexto): index.md
  - Apache Spark (PySpark): pyspark.md
  - Delta Lake: delta.md
  - Apache Iceberg: iceberg.md

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
